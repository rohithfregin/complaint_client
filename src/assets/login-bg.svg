<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <radialGradient id="moonGlow" cx="72%" cy="18%" r="30%">
      <stop offset="0%"   stop-color="rgba(255,255,227,0.22)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="lampGlow" cx="62%" cy="68%" r="18%">
      <stop offset="0%"   stop-color="rgba(255,255,227,0.28)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.9" fill="rgba(203,203,203,0.15)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="#1c1c1c"/>
  <rect width="1440" height="900" fill="url(#dots)"/>

  <!-- Moon glow top-right -->
  <rect width="1440" height="900" fill="url(#moonGlow)"/>
  <!-- Lamp glow center-right -->
  <rect width="1440" height="900" fill="url(#lampGlow)"/>

  <!-- Slate ambient wash bottom -->
  <ellipse cx="720" cy="950" rx="900" ry="300" fill="rgba(109,129,150,0.14)"/>

  <!-- ══ FLOOR ══ -->
  <rect x="0" y="800" width="1440" height="100" fill="#181818"/>
  <!-- floor line -->
  <line x1="0" y1="800" x2="1440" y2="800" stroke="rgba(203,203,203,0.12)" stroke-width="1"/>

  <!-- ══ BACK WALL ══ -->
  <rect x="0" y="0" width="1440" height="800" fill="#222222"/>

  <!-- ══ ARCHED WINDOW (right side) ══ -->
  <!-- window frame outer -->
  <rect x="920" y="120" width="280" height="420" rx="140 140 0 0" fill="#2a2a2a" stroke="rgba(203,203,203,0.20)" stroke-width="3"/>
  <!-- window glass — night sky -->
  <rect x="934" y="134" width="252" height="392" rx="126 126 0 0" fill="#141820"/>
  <!-- moon -->
  <circle cx="1100" cy="220" r="38" fill="rgba(255,255,227,0.75)"/>
  <circle cx="1118" cy="208" r="30" fill="#141820"/>
  <!-- stars in window -->
  <circle cx="960"  cy="170" r="1.5" fill="rgba(255,255,227,0.80)"/>
  <circle cx="1010" cy="155" r="1"   fill="rgba(255,255,227,0.65)"/>
  <circle cx="1150" cy="165" r="1.5" fill="rgba(255,255,227,0.70)"/>
  <circle cx="1170" cy="200" r="1"   fill="rgba(255,255,227,0.55)"/>
  <circle cx="950"  cy="240" r="1"   fill="rgba(255,255,227,0.60)"/>
  <circle cx="1040" cy="300" r="1.5" fill="rgba(255,255,227,0.50)"/>
  <!-- window cross bars -->
  <line x1="1060" y1="134" x2="1060" y2="526" stroke="rgba(203,203,203,0.18)" stroke-width="2"/>
  <line x1="934"  y1="330" x2="1186" y2="330" stroke="rgba(203,203,203,0.18)" stroke-width="2"/>
  <!-- moonlight beam on floor -->
  <polygon points="960,526 1160,526 1220,800 900,800" fill="rgba(255,255,227,0.04)"/>

  <!-- ══ BOOKSHELF LEFT ══ -->
  <!-- shelf unit -->
  <rect x="40" y="200" width="220" height="600" fill="#2e2e2e" stroke="rgba(203,203,203,0.10)" stroke-width="1"/>
  <!-- shelf boards -->
  <rect x="40" y="340" width="220" height="8" fill="#3a3a3a"/>
  <rect x="40" y="480" width="220" height="8" fill="#3a3a3a"/>
  <rect x="40" y="620" width="220" height="8" fill="#3a3a3a"/>
  <!-- books row 1 -->
  <rect x="55"  y="210" width="18" height="125" rx="2" fill="#4A4A4A"/>
  <rect x="76"  y="218" width="14" height="117" rx="2" fill="#6D8196"/>
  <rect x="93"  y="213" width="20" height="122" rx="2" fill="#556677"/>
  <rect x="116" y="220" width="16" height="115" rx="2" fill="#3d3d3d"/>
  <rect x="135" y="210" width="22" height="125" rx="2" fill="#6D8196"/>
  <rect x="160" y="215" width="15" height="120" rx="2" fill="#4A4A4A"/>
  <rect x="178" y="212" width="19" height="123" rx="2" fill="#8fa3b5"/>
  <rect x="200" y="218" width="14" height="117" rx="2" fill="#556677"/>
  <rect x="217" y="210" width="18" height="125" rx="2" fill="#4A4A4A"/>
  <!-- books row 2 -->
  <rect x="55"  y="352" width="20" height="122" rx="2" fill="#8fa3b5"/>
  <rect x="78"  y="358" width="15" height="116" rx="2" fill="#4A4A4A"/>
  <rect x="96"  y="354" width="22" height="120" rx="2" fill="#6D8196"/>
  <rect x="121" y="360" width="16" height="114" rx="2" fill="#3d3d3d"/>
  <rect x="140" y="352" width="18" height="122" rx="2" fill="#556677"/>
  <rect x="161" y="356" width="14" height="118" rx="2" fill="#4A4A4A"/>
  <rect x="178" y="352" width="21" height="122" rx="2" fill="#6D8196"/>
  <rect x="202" y="358" width="16" height="116" rx="2" fill="#8fa3b5"/>
  <!-- books row 3 -->
  <rect x="55"  y="492" width="16" height="122" rx="2" fill="#4A4A4A"/>
  <rect x="74"  y="498" width="20" height="116" rx="2" fill="#6D8196"/>
  <rect x="97"  y="494" width="14" height="120" rx="2" fill="#556677"/>
  <rect x="114" y="492" width="22" height="122" rx="2" fill="#3d3d3d"/>
  <rect x="139" y="496" width="18" height="118" rx="2" fill="#8fa3b5"/>
  <rect x="160" y="492" width="15" height="122" rx="2" fill="#4A4A4A"/>
  <rect x="178" y="494" width="20" height="120" rx="2" fill="#6D8196"/>
  <rect x="201" y="498" width="16" height="116" rx="2" fill="#556677"/>

  <!-- ══ BOOKSHELF RIGHT ══ -->
  <rect x="1180" y="200" width="220" height="600" fill="#2e2e2e" stroke="rgba(203,203,203,0.10)" stroke-width="1"/>
  <rect x="1180" y="340" width="220" height="8" fill="#3a3a3a"/>
  <rect x="1180" y="480" width="220" height="8" fill="#3a3a3a"/>
  <rect x="1180" y="620" width="220" height="8" fill="#3a3a3a"/>
  <!-- books right row 1 -->
  <rect x="1195" y="210" width="18" height="125" rx="2" fill="#6D8196"/>
  <rect x="1216" y="215" width="14" height="120" rx="2" fill="#4A4A4A"/>
  <rect x="1233" y="210" width="20" height="125" rx="2" fill="#8fa3b5"/>
  <rect x="1256" y="218" width="16" height="117" rx="2" fill="#556677"/>
  <rect x="1275" y="210" width="22" height="125" rx="2" fill="#4A4A4A"/>
  <rect x="1300" y="213" width="15" height="122" rx="2" fill="#6D8196"/>
  <rect x="1318" y="210" width="19" height="125" rx="2" fill="#3d3d3d"/>
  <rect x="1340" y="215" width="14" height="120" rx="2" fill="#8fa3b5"/>
  <rect x="1357" y="210" width="18" height="125" rx="2" fill="#556677"/>
  <!-- books right row 2 -->
  <rect x="1195" y="352" width="20" height="122" rx="2" fill="#4A4A4A"/>
  <rect x="1218" y="356" width="15" height="118" rx="2" fill="#6D8196"/>
  <rect x="1236" y="352" width="22" height="122" rx="2" fill="#556677"/>
  <rect x="1261" y="358" width="16" height="116" rx="2" fill="#8fa3b5"/>
  <rect x="1280" y="352" width="18" height="122" rx="2" fill="#4A4A4A"/>
  <rect x="1301" y="354" width="14" height="120" rx="2" fill="#6D8196"/>
  <rect x="1318" y="352" width="21" height="122" rx="2" fill="#3d3d3d"/>
  <rect x="1342" y="356" width="16" height="118" rx="2" fill="#556677"/>

  <!-- ══ READING DESK (center-right) ══ -->
  <!-- desk surface -->
  <rect x="580" y="680" width="420" height="18" rx="4" fill="#3a3a3a" stroke="rgba(203,203,203,0.12)" stroke-width="1"/>
  <!-- desk legs -->
  <rect x="600" y="698" width="14" height="102" fill="#2e2e2e"/>
  <rect x="970" y="698" width="14" height="102" fill="#2e2e2e"/>
  <!-- open book on desk -->
  <ellipse cx="720" cy="680" rx="70" ry="8" fill="#f5f5e0" opacity="0.85"/>
  <line x1="720" y1="672" x2="720" y2="688" stroke="rgba(74,74,74,0.5)" stroke-width="1"/>
  <!-- book text lines -->
  <line x1="660" y1="676" x2="715" y2="676" stroke="rgba(74,74,74,0.25)" stroke-width="1"/>
  <line x1="658" y1="679" x2="715" y2="679" stroke="rgba(74,74,74,0.20)" stroke-width="1"/>
  <line x1="725" y1="676" x2="778" y2="676" stroke="rgba(74,74,74,0.25)" stroke-width="1"/>
  <line x1="725" y1="679" x2="776" y2="679" stroke="rgba(74,74,74,0.20)" stroke-width="1"/>

  <!-- ══ DESK LAMP ══ -->
  <!-- base -->
  <ellipse cx="860" cy="680" rx="28" ry="6" fill="#3d3d3d"/>
  <!-- pole -->
  <line x1="860" y1="674" x2="855" y2="610" stroke="#4A4A4A" stroke-width="5" stroke-linecap="round"/>
  <!-- arm -->
  <line x1="855" y1="610" x2="820" y2="640" stroke="#4A4A4A" stroke-width="4" stroke-linecap="round"/>
  <!-- shade -->
  <polygon points="800,638 840,638 830,660 810,660" fill="#6D8196"/>
  <!-- bulb glow -->
  <ellipse cx="820" cy="650" rx="40" ry="30" fill="rgba(255,255,227,0.18)"/>
  <circle cx="820" cy="648" r="5" fill="rgba(255,255,227,0.90)"/>

  <!-- ══ CHAIR ══ -->
  <rect x="680" y="750" width="80" height="10" rx="3" fill="#3a3a3a"/>
  <rect x="690" y="760" width="10" height="40" fill="#2e2e2e"/>
  <rect x="750" y="760" width="10" height="40" fill="#2e2e2e"/>
  <rect x="680" y="720" width="80" height="30" rx="4" fill="#4A4A4A"/>

  <!-- ══ CEILING DETAILS ══ -->
  <!-- cornice line -->
  <rect x="0" y="80" width="1440" height="6" fill="rgba(203,203,203,0.08)"/>
  <!-- hanging light fixture -->
  <line x1="720" y1="0" x2="720" y2="120" stroke="rgba(203,203,203,0.20)" stroke-width="2"/>
  <ellipse cx="720" cy="128" rx="22" ry="10" fill="#3a3a3a" stroke="rgba(203,203,203,0.15)" stroke-width="1"/>
  <ellipse cx="720" cy="132" rx="14" ry="6" fill="rgba(255,255,227,0.12)"/>

  <!-- ══ DARK OVERLAY for readability ══ -->
  <rect width="1440" height="900" fill="rgba(15,15,15,0.50)"/>
</svg>
