<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <radialGradient id="deskGlow" cx="50%" cy="70%" r="50%">
      <stop offset="0%"   stop-color="rgba(109,129,150,0.18)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="topGlow" cx="50%" cy="0%" r="40%">
      <stop offset="0%"   stop-color="rgba(255,255,227,0.10)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- blueprint grid -->
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(109,129,150,0.12)" stroke-width="0.8"/>
    </pattern>
    <!-- dot accent -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="rgba(203,203,203,0.10)"/>
    </pattern>
  </defs>

